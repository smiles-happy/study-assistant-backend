<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的学习任务</title>
    <!-- 引入SheetJS库用于Excel导出 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .username {
            font-weight: bold;
            color: #333;
        }

        h2 {
            color: white;
            font-size: 32px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-box h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-box label {
            margin-right: 10px;
            color: #555;
        }

        .form-box input, .form-box select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-box input:focus, .form-box select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            padding: 8px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        th:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }

        th.sorted-asc::after {
            content: " ↑";
        }

        th.sorted-desc::after {
            content: " ↓";
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #f0f2ff;
        }

        .del-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .del-btn:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .edit-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .edit-btn:hover {
            background: #0056b3;
            transform: translateY(-1px);
        }

        .remark-btn {
            background: #ffc107;
            color: #212529;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .remark-btn:hover {
            background: #e0a800;
            transform: translateY(-1px);
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-form-group {
            margin-bottom: 20px;
        }

        .modal-form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .modal-form-group input, .modal-form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .modal-form-group input:focus, .modal-form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .modal-btn-cancel {
            background: #6c757d;
            color: white;
        }

        .modal-btn-cancel:hover {
            background: #5a6268;
        }

        .modal-btn-confirm {
            background: #007bff;
            color: white;
        }

        .modal-btn-confirm:hover {
            background: #0056b3;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 120px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* 修复删除按钮红色样式 */
.btn-danger {
    background: #dc3545;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
}
.btn-danger:hover {
    background: #c82333;
}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a class="back" href="index.html">← 返回首页</a>
        <h2>我的学习任务</h2>
        <div class="user-info" onclick="openProfileModal()">
            <img id="userAvatar" class="avatar" src="" alt="头像">
            <span id="userName" class="username">加载中...</span>
        </div>
    </div>

    <!-- 任务统计 -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">总任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="uncompletedCount" style="color:#dc3545">0</div>
            <div class="stat-label">未完成</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="completedCount" style="color:#28a745">0</div>
            <div class="stat-label">已完成</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="expiredCount" style="color:#ffc107">0</div>
            <div class="stat-label">已过期</div>
        </div>
    </div>

    <div class="form-box">
        <h3>新增任务</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <label>分类：
                <select id="add_cate_id" required>
                    <option value="1">作业</option>
                    <option value="2">复习</option>
                    <option value="3">预习</option>
                    <option value="4">小组任务</option>
                    <option value="5">实验</option>
                    <option value="6">项目</option>
                </select>
            </label>
            <label>标题：<input type="text" id="add_title" required></label>
            <label>内容：<input type="text" id="add_content" required></label>
            <label>优先级：
                <select id="add_priority">
                    <option value="1">高</option>
                    <option value="2" selected>中</option>
                    <option value="3">低</option>
                </select>
            </label>
            <label>截止：<input type="datetime-local" id="add_deadline" required></label>
            <button onclick="addTask()" class="add-btn">添加</button>
        </div>
    </div>

    <div class="action-bar">
        <div class="search-box">

        </div>
        <div class="action-buttons">
            <button onclick="exportToExcel()" class="btn btn-success">导出Excel</button>
            <button onclick="enableNotifications()" class="btn btn-primary">开启提醒</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>任务ID</th>
            <th>分类</th>
            <th>任务标题</th>
            <th>任务内容</th>
            <th onclick="sortTasks('priority')">优先级</th>
            <th onclick="sortTasks('deadline')">截止时间</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="taskBody"></tbody>
    </table>

</div>

<!-- 个人中心模态框 -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">个人中心</div>
        <div style="text-align:center;margin-bottom:20px;">
            <img id="modalAvatar" class="avatar" src="" alt="头像" style="width:100px;height:100px;border-radius:50%;">
        </div>
        <!-- 新增：头像URL输入框 -->
        <div class="modal-form-group">
            <label>头像地址 (URL)</label>
            <input type="text" id="newAvatarUrl" placeholder="请输入头像图片链接">
        </div>
        <!-- 新增：用户名输入框 -->
        <div class="modal-form-group">
            <label>修改用户名</label>
            <input type="text" id="newUsername" placeholder="请输入新用户名">
        </div>
        <!-- 原有：旧密码 -->
        <div class="modal-form-group">
            <label>旧密码</label>
            <input type="password" id="oldPassword" placeholder="请输入旧密码">
        </div>
        <!-- 原有：新密码 -->
        <div class="modal-form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" placeholder="请输入新密码">
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeProfileModal()">取消</button>
            <!-- 按钮调用函数改成 saveProfile -->
            <button class="modal-btn modal-btn-confirm" onclick="saveProfile()">保存设置</button>
        </div>
    </div>
</div>

<!-- 任务备注模态框 -->
<div id="remarkModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">任务备注</div>
        <div class="modal-form-group">
            <label>任务标题</label>
            <input type="text" id="remarkTaskTitle" disabled>
        </div>
        <div class="modal-form-group">
            <label>备注内容</label>
            <textarea id="remarkContent" rows="6" placeholder="请输入任务备注..."></textarea>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeRemarkModal()">取消</button>
            <button class="modal-btn modal-btn-confirm" onclick="saveRemark()">保存备注</button>
        </div>
    </div>
</div>
<script>
    let allTasks = [];
    const categoryMap = {1:"作业",2:"复习",3:"预习",4:"实验",5:"考试",6:"项目"};

    // 页面加载完成后自动执行（整个页面的初始化入口）
window.onload = function() {
    // 1. 从地址栏获取登录后传递过来的用户ID
    const urlParams = new URLSearchParams(window.location.search);
    const user_id = urlParams.get("user_id");

    // 2. 校验：没拿到用户ID说明没登录，强制跳回登录页
    if (!user_id) {
        alert("请先登录！");
        location.href = "login.html";
        return;
    }

    // 3. 初始化页面状态：清空默认的“加载中”文字，避免一直卡在加载状态
    const userNameEl = document.getElementById("userName");
    if (userNameEl) {
        userNameEl.textContent = "";
    }

    // 4. 加载当前用户的任务列表
    loadTasks(user_id);

    // 5. 加载当前用户的头像和昵称
    loadUserInfo(user_id);
};
    // 加载任务列表（修正统计问题）
    function loadTasks(user_id) {
        fetch(`/task/list?user_id=${user_id}&t=${Date.now()}`)
        .then(res => {
            if (!res.ok) throw new Error(`HTTP错误: ${res.status}`);
            return res.json();
        })
        .then(tasks => {
            console.log("后端返回的任务数据:", tasks);
            allTasks = tasks;
            renderTasks(tasks);
            updateStats(); // 修正统计函数调用
        })
        .catch(err => {
            console.error("加载任务失败:", err);
        });
    }

    // 渲染任务列表
    function renderTasks(tasks) {
        const tbody = document.querySelector("table tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        if (tasks.length === 0) {
            const tr = document.createElement("tr");
            tr.innerHTML = '<td colspan="8" style="text-align: center; padding: 20px;">暂无任务</td>';
            tbody.appendChild(tr);
            return;
        }

        tasks.forEach(task => {
            const deadline = new Date(task.deadline);
            const formattedDeadline = `${deadline.getFullYear()}/${(deadline.getMonth()+1).toString().padStart(2,'0')}/${deadline.getDate().toString().padStart(2,'0')} ${deadline.getHours().toString().padStart(2,'0')}:${deadline.getMinutes().toString().padStart(2,'0')}`;

            let priorityClass = "";
            let priorityText = "";
            if(task.priority === 1) { priorityClass = "text-red-500"; priorityText = "高"; }
            else if(task.priority === 2) { priorityClass = "text-yellow-500"; priorityText = "中"; }
            else { priorityClass = "text-green-500"; priorityText = "低"; }

            let statusText = task.status === 1 ? "已完成" : "未完成";
            let checked = task.status === 1 ? "checked" : "";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${task.task_id}</td>
                <td>${categoryMap[task.cate_id] || "其他"}</td>
                <td>${task.title}</td>
                <td>${task.content || ""}</td>
                <td class="${priorityClass}">${priorityText}</td>
                <td>${formattedDeadline}</td>
                <td>
                    <input type="checkbox" ${checked} onchange="updateStatus(${task.task_id}, this.checked ? 1 : 0)">
                    ${statusText}
                </td>
                <td>
                    <button type="button" onclick="deleteTask(${task.task_id})" class="btn btn-sm btn-danger">删除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 修正后的统计函数（解决数字为0的问题）
    function updateStats() {
    // 计算四个数字（逻辑完全正确）
    const total = allTasks.length;
    const unfinished = allTasks.filter(t => t.status !== 1).length;
    const finished = allTasks.filter(t => t.status === 1).length;
    const overdue = allTasks.filter(t => t.status !== 1 && new Date(t.deadline) < new Date()).length;

    // 【核心修正】和你HTML里写的ID完全对应
    const elTotal = document.getElementById("totalCount");
    const elUnfinish = document.getElementById("uncompletedCount");
    const elFinish = document.getElementById("completedCount");
    const elOverdue = document.getElementById("expiredCount");

    // 安全赋值，不会报错
    if (elTotal) elTotal.textContent = total;
    if (elUnfinish) elUnfinish.textContent = unfinished;
    if (elFinish) elFinish.textContent = finished;
    if (elOverdue) elOverdue.textContent = overdue;
}

    // 更新任务状态
    function updateStatus(id, status) {
        fetch("/task/update/status", {
            method: "POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: `id=${id}&status=${status}`
        }).then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            loadTasks(urlParams.get("user_id"));
        }).catch(err => console.error("更新状态失败:", err));
    }

    // 删除任务
    function deleteTask(id) {
        if(!confirm("确定要删除这个任务吗？")) return;
        fetch("/task/delete", {
            method: "POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: `id=${id}`
        }).then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            loadTasks(urlParams.get("user_id"));
        }).catch(err => console.error("删除任务失败:", err));
    }

    // ---------------- 个人中心相关函数 ----------------
    // 加载用户信息

    // 打开个人中心弹窗
    function openProfileModal() {
        const modal = document.getElementById("profileModal");
        if(modal) modal.style.display = "block";
    }

    // 关闭个人中心弹窗
    function closeProfileModal() {
        const modal = document.getElementById("profileModal");
        if(modal) modal.style.display = "none";
    }

    // 修改密码
    function updatePassword() {
        const urlParams = new URLSearchParams(window.location.search);
        const user_id = urlParams.get("user_id");

        const oldPassword = document.getElementById("oldPassword")?.value;
        const newPassword = document.getElementById("newPassword")?.value;
        const confirmNewPassword = document.getElementById("confirmNewPassword")?.value;

        if (!oldPassword) { alert("请输入旧密码！"); return; }
        if (!newPassword) { alert("请输入新密码！"); return; }
        if (newPassword.length < 6) { alert("密码长度不能少于6位！"); return; }
        if (newPassword !== confirmNewPassword) { alert("两次输入的新密码不一致！"); return; }

        fetch("/user/password", {
            method: "POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body: `user_id=${user_id}&oldPassword=${oldPassword}&newPassword=${newPassword}`
        }).then(res => res.text()).then(msg => {
            if(msg === "success") {
                alert("密码修改成功！请重新登录");
                closeProfileModal();
                location.href = "login.html";
            } else {
                alert(msg);
            }
        }).catch(err => console.error("修改密码失败:", err));
    }

    // 全局阻止回车键提交
    document.addEventListener("keydown", function(e) {
        if(e.key === "Enter" && e.target.tagName === "INPUT") {
            e.preventDefault();
        }
    });
// 添加任务功能（和你的后端接口完全对应）
function addTask() {
    const urlParams = new URLSearchParams(window.location.search);
    const user_id = urlParams.get("user_id");

    // 获取表单里的值
    const cateId = document.getElementById("add_cate_id").value;
    const title = document.getElementById("add_title").value.trim();
    const content = document.getElementById("add_content").value.trim();
    const priority = document.getElementById("add_priority").value;
    const deadline = document.getElementById("add_deadline").value;

    // 简单校验
    if (!title) { alert("请输入任务标题！"); return; }
    if (!deadline) { alert("请选择截止时间！"); return; }

    // 发送请求到后端
    fetch("/task/add", {
        method: "POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body: new URLSearchParams({user_id,cate_id:cateId,title,content,priority,deadline})
    }).then(res => res.text()).then(msg => {
        if(msg === "success"){
            alert("添加成功！");
            // 清空表单
            document.getElementById("add_title").value = "";
            document.getElementById("add_content").value = "";
            document.getElementById("add_deadline").value = "";
            // 重新加载任务列表
            loadTasks();
        }else{
            alert("添加失败，请检查输入");
        }
    });
}
// 导出Excel功能（需要你已经引入了xlsx库）
function exportToExcel() {
    if(allTasks.length === 0) {
        alert("没有任务可以导出");
        return;
    }

    // 把任务数据转换成Excel格式
    const excelData = allTasks.map(task => ({
        "任务ID": task.task_id,
        "分类": {1:"作业",2:"复习",3:"预习",4:"实验",5:"考试",6:"项目"}[task.cate_id] || "其他",
        "标题": task.title,
        "内容": task.content || "",
        "优先级": task.priority === 1 ? "高" : task.priority === 2 ? "中" : "低",
        "截止时间": new Date(task.deadline).toLocaleString(),
        "状态": task.status === 1 ? "已完成" : "未完成",
        "备注": task.remark || ""
    }));

    // 生成并下载Excel文件
    const ws = XLSX.utils.json_to_sheet(excelData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "学习任务");
    XLSX.writeFile(wb, `学习任务列表_${new Date().toLocaleDateString()}.xlsx`);
}
// 开启桌面提醒功能
function enableNotifications() {
    if (!("Notification" in window)) {
        alert("你的浏览器不支持桌面通知功能");
        return;
    }

    if (Notification.permission === "granted") {
        alert("提醒功能已开启，有任务即将截止时会收到通知");
        // 立即检查一次即将截止的任务
        checkUpcomingTasks();
    } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("提醒功能已开启，有任务即将截止时会收到通知");
                checkUpcomingTasks();
            } else {
                alert("你拒绝了通知权限，提醒功能无法使用");
            }
        });
    } else {
        alert("你已拒绝通知权限，请在浏览器设置中手动开启");
    }
}

// 检查24小时内即将截止的任务
function checkUpcomingTasks() {
    const now = new Date();
    const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);

    const upcomingTasks = allTasks.filter(task => {
        const deadline = new Date(task.deadline);
        return task.status !== 1 && deadline > now && deadline < tomorrow;
    });

    if (upcomingTasks.length > 0 && Notification.permission === "granted") {
        new Notification("学习任务提醒", {
            body: `你有${upcomingTasks.length}个任务即将在明天截止`,
        });
    }
}
// 保存备注功能
function saveRemark() {
    const taskId = document.getElementById("remarkTaskId")?.value;
    const remark = document.getElementById("remarkContent")?.value;
    if(!taskId) return;

    fetch("/task/update/remark", {
        method: "POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body: `id=${taskId}&remark=${remark}`
    }).then(() => {
        closeRemarkModal();
        loadTasks();
    });
}

// 加载用户信息（兼容所有常见后端字段格式）
function loadUserInfo(user_id) {
    fetch("/user/info", {
        method: "POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body: `user_id=${user_id}`
    })
    .then(res => res.json())
    .then(data => {
        console.log("用户信息接口返回:", data); // 控制台打印数据，方便排查问题
        if(data.code === 200) {
            const userData = data.data || {};

            // 兼容多种昵称字段名，兜底显示“用户”
            const userName = userData.name || userData.username || "用户";
            // 头像为空时，自动生成默认头像兜底
            const avatarUrl = userData.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user_id}`;

            // 1. 更新页面右上角的头像和昵称
            const avatarEl = document.getElementById("userAvatar");
            const nameEl = document.getElementById("userName");
            if(avatarEl) avatarEl.src = avatarUrl;
            if(nameEl) nameEl.textContent = userName;

            // 2. 同步填充个人中心弹窗的输入框
            const inputName = document.getElementById("newUsername");
            const inputAvatar = document.getElementById("newAvatarUrl");
            if(inputName) inputName.value = userName;
            if(inputAvatar) inputAvatar.value = avatarUrl;
        } else {
            console.error("用户信息加载失败，后端返回:", data);
        }
    })
    .catch(err => {
        console.error("用户信息接口请求失败:", err);
        // 请求失败也有兜底，不会一直停在加载状态
        const nameEl = document.getElementById("userName");
        const avatarEl = document.getElementById("userAvatar");
        if(nameEl) nameEl.textContent = "用户";
        if(avatarEl) avatarEl.src = "https://api.dicebear.com/7.x/avataaars/svg?seed=default";
    });
}
function saveProfile() {
    const urlParams = new URLSearchParams(window.location.search);
    const user_id = urlParams.get("user_id");

    // 变量名也对应改成name，避免混淆
    const name = document.getElementById("newUsername").value.trim();
    const avatar = document.getElementById("newAvatarUrl").value.trim();
    const oldPassword = document.getElementById("oldPassword").value.trim();
    const newPassword = document.getElementById("newPassword").value.trim();

    if (!oldPassword) {
        alert("请输入旧密码验证身份！");
        return;
    }

    fetch("/user/update", {
        method: "POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        // 关键：参数名用 name，和后端主参数对齐
        body: `user_id=${user_id}&name=${name}&avatar=${encodeURIComponent(avatar)}&oldPassword=${oldPassword}&newPassword=${newPassword}`
    })
    .then(res => res.json())
    .then(data => {
        if(data.code === 200) {
            alert("信息更新成功！");
            closeProfileModal();
            location.reload();
        } else {
            alert(data.msg || "更新失败");
        }
    })
    .catch(err => {
        alert("网络请求失败，请检查后端是否启动");
    });
}
    // 点击空白处关闭弹窗
    window.onclick = function(event) {
        const profileModal = document.getElementById("profileModal");
        if (profileModal && event.target === profileModal) closeProfileModal();
    };
</script>
