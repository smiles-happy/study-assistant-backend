<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 学生个人学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            /* 和首页、登录页完全相同的渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .register-title {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            background-color: white;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
            transition: all 0.3s ease;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(40, 167, 69, 0.5);
            background: linear-gradient(135deg, #218838 0%, #1e7e34 100%);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h1 class="register-title">用户注册</h1>
    <form id="registerForm">
        <div class="form-group">
            <input type="text" id="username" class="form-input" placeholder="请输入用户名（3-20位）" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" class="form-input" placeholder="请输入密码（6-20位）" required>
        </div>
        <div class="form-group">
            <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" class="register-btn">立即注册</button>
    </form>
    <a href="login.html" class="back-link">← 已有账号？返回登录</a>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // 前端表单验证
        if (username.length < 3 || username.length > 20) {
            alert("用户名长度必须在3到20位之间！");
            return;
        }
        if (password.length < 6 || password.length > 20) {
            alert("密码长度必须在6到20位之间！");
            return;
        }
        if (password !== confirmPassword) {
            alert("两次输入的密码不一致！");
            return;
        }

        // 提交注册请求
        fetch('/user/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `username=${username}&password=${password}`
        })
        .then(res => res.text())
        .then(msg => {
            if(msg === 'success') {
                alert("注册成功！请登录");
                location.href = 'login.html';
            } else {
                alert(msg);
            }
        });
    });
</script>
</body>
</html>
