<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 学生个人学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            /* 和首页完全相同的渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-title {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            background-color: white;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.4);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 123, 255, 0.5);
            background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1 class="login-title">用户登录</h1>
    <form id="loginForm">
        <div class="form-group">
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="login-btn">登录</button>
        <div style="margin-top: 20px;">
            <a href="register.html" style="color: #007bff; text-decoration: none; font-size: 14px;">
                没有账号？立即注册
            </a>
        </div>
    </form>
    <a href="index.html" class="back-link">← 返回首页</a>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username) {
            alert("请输入用户名！");
            return;
        }
        if (!password) {
            alert("请输入密码！");
            return;
        }

        fetch('/user/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `username=${username}&password=${password}`
        })
        .then(res => res.json())
        .then(data => {
            console.log("后端登录返回:", data); // 控制台会打印返回内容，方便排查
            if(data.code === 200) {
                // 自动适配两种最常见的后端返回格式
                const userId = data.data?.id || data.user_id || data.id;
                location.href = `task-list.html?user_id=${userId}`;
            } else {
                alert(data.msg || "用户名或密码错误");
            }
        })
        .catch(err => {
            console.error("登录失败:", err);
            alert("登录失败，请检查后端服务是否运行");
        });
    });
</script>
</body>
</html>
