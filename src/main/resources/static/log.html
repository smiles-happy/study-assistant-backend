<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统操作日志</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
          background: #f4f6ff;
        }
        .sidebar {
          width: 180px;
          background: #4b5fd8;
          height: 100vh;
          position: fixed;
          top: 0;
          left: 0;
          padding: 30px 15px;
        }
        .sidebar h3 {
          color: #fff;
          margin-bottom: 30px;
          text-align: center;
        }
        .sidebar a {
          display: block;
          color: #fff;
          text-decoration: none;
          margin: 20px 0;
          padding: 10px;
          border-radius: 6px;
        }
        .sidebar a:hover {
          background: rgba(255,255,255,0.2);
        }
        .main-box {
          margin-left: 180px;
          padding: 30px;
        }
        h2 {
          text-align: center;
          margin-bottom: 20px;
          color: #333;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          background: #fff;
          border-radius: 8px;
          overflow: hidden;
        }
        th,td {
          border: 1px solid #ddd;
          padding: 12px;
          text-align: center;
        }
        th {
          background: #4b5fd8;
          color: #fff;
        }
        .page-box {
          margin-top: 20px;
          text-align: center;
        }
        .page-box button {
          padding: 6px 16px;
          margin: 0 8px;
          cursor: pointer;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h3>学习助手菜单</h3>
    <a href="task-list.html">📋 我的学习任务</a>
    <a href="stat.html">📊 学习数据统计</a>
    <a href="log.html">📜 系统操作日志</a>
</div>
<div class="main-box">
    <h2>📜 个人操作日志</h2>
    <table>
        <thead>
        <tr>
            <th>日志ID</th>
            <th>操作内容</th>
            <th>操作时间</th>
        </tr>
        </thead>
        <tbody id="logTableBody"></tbody>
    </table>
    <div class="page-box">
        <button id="prevPage">上一页</button>
        <span id="pageInfo">第1页</span>
        <button id="nextPage">下一页</button>
    </div>
</div>

<!-- 自动拼接user_id参数JS -->
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('user_id');
    document.querySelectorAll('.sidebar a').forEach(a => {
      const baseHref = a.getAttribute('href');
      a.href = `${baseHref}?user_id=${uid}`;
    })
</script>

<script>
    // 页面加载完成后再渲染日志
window.onload = function(){
    const uid = new URLSearchParams(location.search).get("user_id");
    let pageNum = 1;
    const pageSize = 10;
    // 模拟日志数据，后续可以对接后端接口
    const mockLogList = [
        {id:1,content:"登录系统",time:"2026-06-20 08:20:00"},
        {id:2,content:"新增学习任务",time:"2026-06-20 09:15:00"},
        {id:3,content:"修改任务截止时间",time:"2026-06-20 10:30:00"},
        {id:4,content:"完成番茄25分钟学习计时",time:"2026-06-20 14:10:00"},
        {id:5,content:"查看学习数据统计",time:"2026-06-20 15:45:00"}
    ];

    function loadLog(){
        const tbody = document.getElementById("logTableBody");
        tbody.innerHTML = "";
        mockLogList.forEach(item=>{
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${item.id}</td><td>${item.content}</td><td>${item.time}</td>`;
            tbody.appendChild(tr);
        })
        document.getElementById("pageInfo").innerText = `第${pageNum}页`;
    }
    // 初始化加载日志
    loadLog();

    // 上一页
    document.getElementById("prevPage").onclick = ()=>{
        if(pageNum > 1){
            pageNum--;
            loadLog();
        }
    }
    // 下一页
    document.getElementById("nextPage").onclick = ()=>{
        pageNum++;
        loadLog();
    }
}
</script>
</body>
</html>
